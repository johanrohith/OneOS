<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneOS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111827;
    color:white;
    display:flex;
    height:100vh;
}

body.light{
    background:#f5f5f5;
    color:#111;
}

.sidebar{
    width:220px;
    background:#1f2937;
    padding:20px;
}

body.light .sidebar{
    background:#ffffff;
}

.sidebar h2{
    margin-bottom:20px;
}

.sidebar button{
    width:100%;
    margin:8px 0;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.main{
    flex:1;
    padding:25px;
    overflow:auto;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

.card{
    background:#202938;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
}

body.light .card{
    background:white;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

textarea{
    height:180px;
    resize:vertical;
}

.task{
    display:flex;
    justify-content:space-between;
    background:#2e3748;
    padding:10px;
    border-radius:8px;
    margin:8px 0;
}

body.light .task{
    background:#ececec;
}

button.action{
    padding:10px 15px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>OneOS</h2>

    <button onclick="showPage('home')">🏠 Home</button>
    <button onclick="showPage('notes')">📝 Notes</button>
    <button onclick="showPage('tasks')">✅ Tasks</button>
    <button onclick="toggleTheme()">🌙 Theme</button>
</div>

<div class="main">

<div id="home" class="page active">
    <div class="card">
        <h1>Welcome</h1>
        <br>
        <h2 id="clock"></h2>
        <p id="date"></p>
    </div>

    <div class="card">
        <h3>Today's Goal</h3>
        <p>Build OneOS 🚀</p>
    </div>
</div>

<div id="notes" class="page">

<div class="card">
<h2>Notes</h2>

<textarea id="notesBox"
placeholder="Write something..."></textarea>

<button class="action" onclick="saveNotes()">Save Notes</button>

</div>

</div>

<div id="tasks" class="page">

<div class="card">

<h2>Tasks</h2>

<input id="taskInput" placeholder="New Task">

<button class="action" onclick="addTask()">Add Task</button>

<div id="taskList"></div>

</div>

</div>

</div>

<script>

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

function clock(){

const d=new Date();

document.getElementById("clock").innerHTML=
d.toLocaleTimeString();

document.getElementById("date").innerHTML=
d.toDateString();

}

setInterval(clock,1000);
clock();

function toggleTheme(){

document.body.classList.toggle("light");

localStorage.setItem(
"theme",
document.body.classList.contains("light")
);

}

if(localStorage.getItem("theme")=="true"){
document.body.classList.add("light");
}

const notes=document.getElementById("notesBox");

notes.value=localStorage.getItem("notes")||"";

function saveNotes(){

localStorage.setItem("notes",notes.value);

alert("Notes Saved");

}

let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");

function render(){

const list=document.getElementById("taskList");

list.innerHTML="";

tasks.forEach((task,index)=>{

list.innerHTML+=`
<div class="task">
<span>${task}</span>
<button onclick="removeTask(${index})">❌</button>
</div>
`;

});

localStorage.setItem(
"tasks",
JSON.stringify(tasks)
);

}

function addTask(){

const input=document.getElementById("taskInput");

if(input.value.trim()=="") return;

tasks.push(input.value);

input.value="";

render();

}

function removeTask(i){

tasks.splice(i,1);

render();

}

render();

</script>

</body>
</html>
