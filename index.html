<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneOS MVP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{display:flex;height:100vh;background:#111827;color:#fff}
body.light{background:#f5f5f5;color:#111}
.sidebar{width:220px;background:#1f2937;padding:20px}
body.light .sidebar{background:#fff}
.sidebar button{width:100%;margin:8px 0;padding:10px;border:none;border-radius:8px;cursor:pointer}
.main{flex:1;padding:20px;overflow:auto}
.page{display:none}.page.active{display:block}
.card{background:#202938;padding:15px;border-radius:12px;margin-bottom:16px}
body.light .card{background:#fff}
textarea,input{width:100%;padding:10px;margin:10px 0;border:none;border-radius:8px}
textarea{height:180px}
.task{display:flex;justify-content:space-between;background:#2e3748;padding:10px;border-radius:8px;margin:8px 0}
body.light .task{background:#ececec}
</style>
</head>
<body>
<div class="sidebar">
<h2>OneOS</h2>
<button onclick="showPage('home')">🏠 Home</button>
<button onclick="showPage('notes')">📝 Notes</button>
<button onclick="showPage('tasks')">✅ Tasks</button>
<button onclick="toggleTheme()">🌙 Theme</button>
</div>

<div class="main">
<div id="home" class="page active">
<div class="card"><h1>Welcome</h1><br><h2 id="clock"></h2><p id="date"></p></div>
<div class="card"><h3>Today's Goal</h3><p>Build OneOS 🚀</p></div>
</div>

<div id="notes" class="page">
<div class="card">
<h2>Notes</h2>
<textarea id="notesBox"></textarea>
<button onclick="saveNotes()">Save Notes</button>
</div>
</div>

<div id="tasks" class="page">
<div class="card">
<h2>Tasks</h2>
<input id="taskInput" placeholder="New Task">
<button onclick="addTask()">Add Task</button>
<div id="taskList"></div>
</div>
</div>
</div>

<script>
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
function updateClock(){
const d=new Date();
clock.textContent=d.toLocaleTimeString();
date.textContent=d.toDateString();
}
setInterval(updateClock,1000);updateClock();

function toggleTheme(){
document.body.classList.toggle('light');
localStorage.theme=document.body.classList.contains('light');
}
if(localStorage.theme==="true")document.body.classList.add('light');

notesBox.value=localStorage.notes||"";
function saveNotes(){
localStorage.notes=notesBox.value;
alert("Saved!");
}

let tasks=JSON.parse(localStorage.tasks||"[]");
function render(){
taskList.innerHTML="";
tasks.forEach((t,i)=>{
taskList.innerHTML+=`<div class="task"><span>${t}</span><button onclick="removeTask(${i})">❌</button></div>`;
});
localStorage.tasks=JSON.stringify(tasks);
}
function addTask(){
if(taskInput.value.trim()=="")return;
tasks.push(taskInput.value);
taskInput.value="";
render();
}
function removeTask(i){tasks.splice(i,1);render();}
render();
</script>
</body>
</html>
